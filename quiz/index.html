<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tech Quiz</title>
    <link rel="stylesheet" href="css/style.css"> 
    <script src="js/script.js" defer></script>
</head>
<body>
    <div id="quiz-container">
        <h1 id="quiz-title">The Tech Quiz Challenge</h1>
        <div id="question-area">
            <div id="question" class="question-text">Loading question...</div>
            <form id="optionsForm" class="options-grid">
                </form>
        </div>

        <button id="submit" type="button">Submit Answer</button>
        <div id="result"></div>
        <button id="next-btn" style="display:none;">Next Question</button>
        <button id="restart-btn" style="display:none;">Restart Quiz</button>
    </div>
</body>
</html>
